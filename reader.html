<!DOCTYPE html>
<html lang="hi"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title id="pgTitle">पुस्तक पाठक — Nyaysahayak</title>
<style>
:root{--p:#8B2000;--pd:#5a1400;--pl:#a03000;--g:#9a7000;--gl:#c8961e;--bg:#faf8f5;--s:#fff;--s2:#f5f0ea;--b:#e0d5c8;--bs:#c8b89a;--t:#1a1208;--t2:#4a3820;--m:#7a6550;--sidebar:290px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
/* TOPBAR */
.topbar{background:var(--pd);border-bottom:2px solid var(--p);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 12px rgba(90,20,0,0.2);z-index:50}
.tb-brand{display:flex;align-items:center;gap:10px}
.tb-icon{width:30px;height:30px;background:rgba(255,255,255,0.12);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;border:1px solid rgba(255,255,255,0.2)}
.tb-title{font-size:0.92rem;font-weight:700;color:#fff;max-width:380px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-sub{font-size:0.62rem;color:rgba(255,220,150,0.8);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{padding:5px 12px;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8);border-radius:7px;cursor:pointer;font-size:0.73rem;text-decoration:none;white-space:nowrap}
.tb-btn:hover{background:rgba(255,255,255,0.15);color:#fff}
/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden}
/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:12px 14px 10px;border-bottom:1px solid var(--b);background:var(--s2)}
.sb-label{font-size:0.6rem;color:var(--g);text-transform:uppercase;letter-spacing:0.6px;font-weight:700;margin-bottom:0}
.sb-list{flex:1;overflow-y:auto;padding:4px 6px}
.ch-item{padding:8px 11px;border-radius:7px;cursor:pointer;margin-bottom:2px;border-left:3px solid transparent;transition:all 0.12s;display:flex;align-items:baseline;gap:8px}
.ch-item:hover{background:var(--s2);border-left-color:var(--bs)}
.ch-item.active{background:#fff5f0;border-left-color:var(--p)}
.ch-num{font-size:0.62rem;color:var(--m);font-weight:700;flex-shrink:0;min-width:22px;text-align:right}
.ch-title{font-size:0.79rem;font-weight:600;color:var(--t);line-height:1.35}
/* CONTENT */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden}
.art-nav{display:flex;align-items:center;justify-content:space-between;padding:9px 22px;border-bottom:1px solid var(--b);background:var(--s);flex-shrink:0;gap:8px}
.nav-btn{padding:6px 13px;background:var(--s2);border:1px solid var(--bs);border-radius:7px;cursor:pointer;font-size:0.76rem;color:var(--t2)}
.nav-btn:hover{background:var(--p);color:#fff;border-color:var(--p)}
.nav-btn:disabled{opacity:0.3;cursor:default;pointer-events:none}
.nav-info{font-size:0.73rem;color:var(--m);text-align:center;flex:1}
/* BOOK CONTENT AREA */
.art-view{flex:1;overflow-y:auto;padding:36px 48px;max-width:860px;margin:0 auto;width:100%}
.book-chapter-label{font-size:0.65rem;color:var(--g);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:10px}
.book-title{font-size:1.45rem;font-weight:800;color:var(--pd);margin-bottom:6px;line-height:1.3;font-family:Georgia,serif}
.book-divider{width:48px;height:3px;background:var(--p);border-radius:2px;margin:14px 0 20px}
.book-meta{font-size:0.7rem;color:var(--m);margin-bottom:20px;font-family:monospace;padding:8px 12px;background:var(--s2);border-radius:6px;display:inline-block}
.book-body{font-size:0.93rem;color:var(--t);line-height:1.85;font-family:Georgia,serif}
.book-body p{margin-bottom:14px;text-align:justify}
.book-provisions{margin-top:22px;border-top:1px solid var(--b);padding-top:18px}
.book-provisions h4{font-size:0.65rem;color:var(--g);text-transform:uppercase;letter-spacing:0.6px;font-weight:700;margin-bottom:12px}
.book-provisions ul{list-style:none;padding:0}
.book-provisions li{padding:9px 0 9px 20px;border-bottom:1px solid var(--b);font-size:0.87rem;color:var(--t);line-height:1.65;position:relative}
.book-provisions li:last-child{border-bottom:none}
.book-provisions li::before{content:"§";color:var(--p);position:absolute;left:0;font-size:0.8rem;font-weight:700}
.cite-row{margin-top:24px;padding-top:14px;border-top:1px solid var(--b);display:flex;gap:8px}
.cite-btn{padding:6px 13px;background:var(--s2);border:1px solid var(--bs);border-radius:6px;font-size:0.72rem;color:var(--t2);cursor:pointer}
.cite-btn:hover{background:var(--p);color:#fff;border-color:var(--p)}
.cite-btn.ok{background:#166534;color:#fff;border-color:#166534}
.empty{text-align:center;padding:60px 20px;color:var(--m);font-size:0.9rem}
@media(max-width:700px){:root{--sidebar:220px}.art-view{padding:20px 18px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-brand">
    <div class="tb-icon">📖</div>
    <div><div class="tb-title" id="bookName">लोड हो रहा है...</div><div class="tb-sub">DBS · Nyaysahayak</div></div>
  </div>
  <div class="tb-right">
    <a class="tb-btn" href="https://nyaysahayak.co.in/library">← पुस्तकालय</a>
    <a href="https://nyaysahayak.co.in/" class="tb-btn">मुख्य पृष्ठ</a>
  </div>
</div>
<div class="layout">
  <div class="sidebar">
    <div class="sb-head"><div class="sb-label">अध्याय सूची</div></div>
    <div class="sb-list" id="sbList"><div class="empty">लोड हो रहा है...</div></div>
  </div>
  <div class="content">
    <div class="art-nav">
      <button class="nav-btn" id="btnPrev" onclick="navigate(-1)" disabled>← पूर्व</button>
      <div class="nav-info" id="navInfo">—</div>
      <button class="nav-btn" id="btnNext" onclick="navigate(1)" disabled>अगला →</button>
      <button class="nav-btn" onclick="document.getElementById('artView').scrollTop=0">↑ शीर्ष</button>
    </div>
    <div class="art-view" id="artView"><div class="empty">?book= parameter missing</div></div>
  </div>
</div>
<script>
const API='https://nyaysahayak-api-production.up.railway.app';
let chapters=[], curIdx=0;

const params=new URLSearchParams(window.location.search);
const bookName=params.get('book')||'';

// Smart title: agar filename-jaisi hai to summary use karo
function getTitle(e){
  const t=(e.title||'').trim();
  const bad=!t||/\.(html|md|pdf|txt)$/i.test(t)||/^chapter\s*file/i.test(t)||/^file\s*:/i.test(t)||/^0\d_/i.test(t);
  if(bad){
    const s=(e.summary||'').trim();
    if(s)return s.length>90?s.substring(0,87)+'…':s;
    return e.department||e.source||'अध्याय '+(chapters.indexOf(e)+1);
  }
  return t;
}

// Meta: sirf tab dikhao jab meaningful ho (sirf number/digit nahi)
function getMeta(e){
  const parts=[];
  const fn=(e.file_number||'').trim();
  // Skip file_number if it's just 1-2 digits (chapter index)
  if(fn && fn.length>2 && !/^\d{1,2}$/.test(fn)) parts.push(fn);
  if(e.date) parts.push(e.date);
  return parts.join(' · ');
}

async function init(){
  if(!bookName){document.getElementById('artView').innerHTML='<div class="empty">?book= parameter missing</div>';return;}
  document.getElementById('bookName').textContent=bookName;
  document.title=bookName+' — Nyaysahayak';
  document.getElementById('pgTitle').textContent=bookName+' — Nyaysahayak';
  try{
    let all=[],page=1;
    while(true){
      const r=await fetch(`${API}/browse/${encodeURIComponent(bookName)}?page=${page}&limit=100`);
      const d=await r.json();
      const ents=d.entries||[];
      all=all.concat(ents);
      if(ents.length<100||all.length>=d.total)break;
      page++;
    }
    chapters=all;
    renderSidebar(chapters);
    if(chapters.length>0)loadChapter(0);
  }catch(e){
    document.getElementById('sbList').innerHTML='<div class="empty">API error: '+e.message+'</div>';
  }
}

function renderSidebar(list){
  const ul=document.getElementById('sbList');
  if(!list.length){ul.innerHTML='<div class="empty">कोई अध्याय नहीं</div>';return;}
  ul.innerHTML=list.map((e)=>{
    const origIdx=chapters.indexOf(e);
    return `<div class="ch-item${origIdx===curIdx?' active':''}" id="ci-${origIdx}" onclick="loadChapter(${origIdx})">
      <div class="ch-num">${origIdx+1}</div>
      <div class="ch-title">${eh(getTitle(e))}</div>
    </div>`;
  }).join('');
}

function loadChapter(idx){
  if(idx<0||idx>=chapters.length)return;
  curIdx=idx;
  const e=chapters[idx];
  const displayTitle=getTitle(e);
  document.getElementById('navInfo').textContent=`${idx+1} / ${chapters.length}`;
  document.getElementById('btnPrev').disabled=idx===0;
  document.getElementById('btnNext').disabled=idx===chapters.length-1;
  document.querySelectorAll('.ch-item').forEach(el=>el.classList.remove('active'));
  const ci=document.getElementById('ci-'+idx);
  if(ci){ci.classList.add('active');ci.scrollIntoView({block:'nearest',behavior:'smooth'});}

  const meta=getMeta(e);
  // Body: summary as flowing paragraphs
  const bodyText=(e.summary||'').trim();
  const bodyHtml=bodyText.split(/\n+/).filter(p=>p.trim()).map(p=>`<p>${eh(p.trim())}</p>`).join('');
  // Provisions: only if they add info beyond summary
  const pvs=(e.key_provisions||[]).filter(p=>p&&p.trim().length>15).map(p=>`<li>${eh(p.trim())}</li>`).join('');
  const cite=[displayTitle,e.source||e.department,meta].filter(Boolean).join(' | ');

  document.getElementById('artView').innerHTML=`
    <div class="book-chapter-label">अध्याय ${idx+1} — ${eh(e.source||bookName)}</div>
    <div class="book-title">${eh(displayTitle)}</div>
    <div class="book-divider"></div>
    ${meta?`<div class="book-meta">${eh(meta)}</div>`:''}
    ${bodyHtml?`<div class="book-body">${bodyHtml}</div>`:''}
    ${pvs?`<div class="book-provisions"><h4>मुख्य प्रावधान</h4><ul>${pvs}</ul></div>`:''}
    <div class="cite-row">
      <button class="cite-btn" id="citeBtn" onclick="copyCite('${ea(cite)}')">📋 Citation कॉपी</button>
    </div>`;
}

function navigate(dir){
  loadChapter(curIdx+dir);
  document.getElementById('artView').scrollTop=0;
}
function copyCite(t){
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.getElementById('citeBtn');
    b.textContent='✅ Copied!';b.classList.add('ok');
    setTimeout(()=>{b.textContent='📋 Citation कॉपी';b.classList.remove('ok');},2000);
  }).catch(()=>prompt('Citation:',t));
}
function eh(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ea(s){if(!s)return'';return String(s).replace(/'/g,'&#39;');}
init();
</script>
</body></html>
